<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Visitor Tracker</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      width: 100%;
      max-width: 700px;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 14px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-top: 0;
    }

    .badge {
      display: inline-block;
      background: #334155;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    #status {
      margin-top: 10px;
      font-size: 16px;
      color: #38bdf8;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      resize: none;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #0ea5e9;
    }

    #msgStatus {
      margin-top: 10px;
      font-size: 14px;
      color: #22c55e;
    }
  </style>
</head>

<body>

  <div class="container">


    <!-- MESSAGE SECTION -->
    <div class="card">
      <h2>Send Anonymous Message to Rachelle</h2>

      <p style="font-size: 13px; color: #94a3b8;">
        Your message is sent without your name.
      </p>

      <textarea id="message" placeholder="Type your message..."></textarea>

      <button onclick="sendMessage()">Send Message</button>

      <p id="msgStatus"></p>
    </div>

  </div>

  <script>
    // TRACK VISIT
    fetch("/visit")
      .then(res => res.json())
      .then(data => {
        const status = document.getElementById("status");

        if (data.newVisitor) {
          status.innerText = "🆕 New visitor detected (first time device)";
        } else {
          status.innerText = "🔁 Returning visitor detected";
        }
      })
      .catch(() => {
        document.getElementById("status").innerText =
          "Error connecting to server.";
      });

    // SEND MESSAGE
    function sendMessage() {
      const message = document.getElementById("message").value;

      if (!message.trim()) {
        document.getElementById("msgStatus").innerText =
          "Please type a message first.";
        return;
      }

      fetch("/message", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      })
      .then(res => res.json())
      .then(() => {
        document.getElementById("msgStatus").innerText =
          "Message sent anonymously ✅";

        document.getElementById("message").value = "";
      })
      .catch(() => {
        document.getElementById("msgStatus").innerText =
          "Failed to send message.";
      });
    }
  </script>

</body>
</html>
