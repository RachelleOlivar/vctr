<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Message Anonymously</title>

  <link rel="icon" type="image/png" href="https://cdn-icons-png.freepik.com/512/5962/5962463.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .header img {
      width: 40px;
      height: 40px;
    }

    .header h1 {
      font-size: 20px;
      margin: 0;
    }

    /* CARD */
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 14px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
    }

    p {
      color: #94a3b8;
      font-size: 13px;
    }

    textarea {
      width: 100%;
      height: 120px;
      margin-top: 10px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 14px;
    }

    button {
      margin-top: 10px;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      background: #38bdf8;
      color: #0f172a;
      font-weight: 700;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #0ea5e9;
      transform: translateY(-1px);
    }

    button:active {
      transform: scale(0.98);
    }

    #msgStatus {
      margin-top: 10px;
      font-size: 14px;
      color: #22c55e;
    }

    /* 📱 MOBILE */
    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .card {
        padding: 15px;
      }

      .header h1 {
        font-size: 18px;
      }

      textarea {
        height: 100px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- MESSAGE SECTION -->
    <div class="card">
      <h2>Send Anonymous Message</h2>
      <p>Your message is sent without your name.</p>

      <textarea id="message" placeholder="Type your message..."></textarea>

      <button onclick="sendMessage()">Send Message</button>

      <p id="msgStatus"></p>
    </div>

  </div>

  <script>
    function sendMessage() {
      const message = document.getElementById("message").value;

      if (!message.trim()) {
        document.getElementById("msgStatus").innerText =
          "Please type a message first.";
        return;
      }

      fetch("/message", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      })
      .then(res => res.json())
      .then(() => {
        document.getElementById("msgStatus").innerText =
          "Message sent anonymously ✅";

        document.getElementById("message").value = "";
      })
      .catch(() => {
        document.getElementById("msgStatus").innerText =
          "Failed to send message.";
      });
    }
  </script>

</body>
</html>
